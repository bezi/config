palette = "customColors"

format = """
[](color1)\
$username\
${custom.hostalias}\
[](bg:color2 fg:color1)\
$directory\
[](fg:color2 bg:color3)\
$aws\
$git_branch\
[ ](fg:color3)\
"""

# Uncomment for demos
# format = """
# [](color1)\
# $username\
# [ ](color1)\
# """

add_newline = false

[username]
show_always = true
style_user = "bg:color1 text1"
style_root = "bg:color1 text1"
format = '[λ ]($style)'
disabled = false

[custom.hostalias]
description = "Hostname with friendly aliases (starship's hostname module lacks aliases)"
when = "true"
command = '''
case "$(hostname)" in
  Oscars-MacBook-Pro) echo work ;;
  bezi-mbp|bezi-mbp.local) echo home ;;
  homelab-onprem-nuc) echo nuc ;;
  *) hostname ;;
esac
'''
style = "bg:color1 text1"
format = '[$output ]($style)'


[directory]
style = "bg:color2 text2"
format = "[ $path ]($style)"
truncation_length = 3

[directory.substitutions]
# "Documents" = "󰈙 "

[git_branch]
symbol = ""
style = "bg:color3 text2"
format = '[ $symbol $branch ]($style)'

[palettes.customColors]
color1 = '#d60270'
color2 = '#9b4f96'
color3 = '#0038a8'
text1 = '#e8e8e8'
text2 = '#e8e8e8'

[aws]
format = '[ $symbol ($profile) -]($style)'
symbol = ''
style = 'bg:color3 text2'
disabled = false
